<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CareCompass — Your Chronic Illness Companion</title>
  <meta name="description" content="Track symptoms, identify patterns, and communicate clearly with your care team. CareCompass helps you navigate chronic illness with confidence." />
  <meta name="theme-color" content="#4a7058" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <!-- Apple PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CareCompass" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CareCompass — Your Chronic Illness Companion" />
  <meta property="og:description" content="Track symptoms, identify patterns, and communicate clearly with your care team." />
  <meta property="og:image" content="/icons/icon-512x512.png" />
  <meta property="og:url" content="https://www.joincarecompass.com" />

  <style>
    html, body { margin: 0; padding: 0; background: #fafaf8; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js', { scope: '/' })
          .then((reg) => {
            console.log('[SW] Registered:', reg.scope);
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('sw-update-available'));
                }
              });
            });
          })
          .catch((err) => console.error('[SW] Registration failed:', err));
      });
    }
  </script>

</body>
</html>
